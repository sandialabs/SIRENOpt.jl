<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280">
  <style>
    .title { font: 700 20px sans-serif; fill: #1f2937; }
    .subtitle { font: 600 14px sans-serif; fill: #334155; }
    .body { font: 13px sans-serif; fill: #334155; }
    .small { font: 12px sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 8; }
    .pkg { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; }
    .siren { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
    .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    .note { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; rx: 8; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="28" y="32" class="title">Wave Resource Boundary: WaveSpectra into SIRENOpt</text>
  <rect x="28" y="58" width="238" height="152" class="box"/>
  <text x="46" y="84" class="subtitle">Inputs</text>
  <text x="46" y="110" class="body">wave spectrum object</text>
  <text x="46" y="132" class="body">optional water density [kg/m^3]</text>
  <text x="46" y="154" class="body">time vector for resource series</text>

  <rect x="320" y="58" width="250" height="152" class="pkg"/>
  <text x="350" y="84" class="subtitle">WaveSpectra calculations</text>
  <text x="350" y="110" class="body">Moments.significant_waveheight</text>
  <text x="350" y="132" class="body">Moments.energy_frequency</text>
  <text x="350" y="154" class="small">converted to energy period and flux</text>

  <rect x="624" y="58" width="228" height="152" class="siren"/>
  <text x="650" y="84" class="subtitle">Outputs</text>
  <text x="650" y="110" class="body">wave_power_flux_kw_per_m(...)</text>
  <text x="650" y="132" class="body">wave_spectrum_power_flux_kw_per_m(...)</text>
  <text x="650" y="154" class="body">wave_resource_timeseries(...)</text>

  <path d="M266 134 L320 134" class="arrow"/>
  <path d="M570 134 L624 134" class="arrow"/>

  <rect x="28" y="226" width="824" height="34" class="note"/>
  <text x="44" y="248" class="small">This is a resource-side boundary only. The present SIRENOpt ontology does not yet have a higher-fidelity WEC package integrated downstream of the wave flux signal.</text>
</svg>
